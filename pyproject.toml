[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort (import sorting), UP = pyupgrade,
# B = flake8-bugbear (common bug patterns).
select = ["E", "W", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
# The system prompt is one long string; line length doesn't apply to prompt text.
"app/services/prompt.py" = ["E501"]
# Dev-only script with formatted table output.
"scripts/*" = ["E501"]
